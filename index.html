<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#07111f">

  <meta
    name="description"
    content="LifeCompass AI — practical everyday help for money, home, travel, work, documents and daily life."
  >

  <title>LifeCompass AI</title>

  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #07111f;
      --bg2: #0a1424;
      --panel: rgba(255, 255, 255, 0.07);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #b6c1d2;
      --purple: #8b5cf6;
      --purple-dark: #6555e8;
      --cyan: #22d3ee;
      --green: #34d399;
      --red: #fb7185;
      --yellow: #fbbf24;
      --shadow: 0 25px 70px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;

      background:
        radial-gradient(
          circle at 10% 0%,
          rgba(139, 92, 246, 0.32),
          transparent 34%
        ),
        radial-gradient(
          circle at 90% 12%,
          rgba(34, 211, 238, 0.2),
          transparent 30%
        ),
        linear-gradient(
          180deg,
          var(--bg),
          var(--bg2) 55%,
          #09111d
        );
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .hidden {
      display: none !important;
    }

    .wrap {
      width: min(1180px, calc(100% - 24px));
      margin: auto;
    }

    .section {
      padding: 76px 0;
    }

    .section-heading {
      max-width: 760px;
      margin: 0 auto 34px;
      text-align: center;
    }

    .section-heading h2 {
      margin: 14px 0;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 1.05;
    }

    .section-heading p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d8e2f0;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 18px var(--green);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(7, 17, 31, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      text-decoration: none;
    }

    .logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      font-size: 22px;
      background: linear-gradient(
        135deg,
        var(--purple),
        var(--cyan)
      );
      box-shadow: 0 10px 30px rgba(34, 211, 238, 0.18);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-links a {
      color: #dbeafe;
      font-size: 14px;
      text-decoration: none;
    }

    .nav-buttons,
    .hero-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 17px;
      border: 0;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }

    .primary {
      color: white;
      background: linear-gradient(
        135deg,
        var(--purple),
        var(--purple-dark)
      );
    }

    .white {
      color: #111827;
      background: white;
    }

    .ghost {
      color: white;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
    }

    .hero {
      padding: 86px 0 52px;
      text-align: center;
    }

    h1 {
      max-width: 970px;
      margin: 18px auto 16px;
      font-size: clamp(48px, 8vw, 88px);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    .gradient {
      display: block;
      color: transparent;
      background: linear-gradient(
        90deg,
        #c4b5fd,
        #67e8f9
      );
      background-clip: text;
      -webkit-background-clip: text;
    }

    .lead {
      max-width: 760px;
      margin: 0 auto 26px;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.65;
    }

    .hero-buttons {
      justify-content: center;
    }

    .trust-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
      color: #dbeafe;
      font-size: 13px;
    }

    .trust-row span {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .feature-card {
      min-height: 230px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.075),
        rgba(255, 255, 255, 0.035)

      box-shadow: var(--shadow);
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      font-size: 26px;
      background: linear-gradient(

        rgba(139, 92, 246, 0.9),
        rgba(34, 211, 238, 0.8)

    }

    .feature-card h3 {
      margin: 18px 0 10px;
      font-size: 22px;
    }

    .feature-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .feature-card button {
      padding: 0;
      border: 0;
      color: #a5f3fc;
      font-weight: 800;
      background: none;
    }

    .skills-strip {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
      align-items: stretch;
    }

    .skills-panel,

      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.05);
    }

    .skills-panel h3,
    .upload-panel h3 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    .skills-panel p,
    .upload-panel p {
      color: var(--muted);
      line-height: 1.65;
    }

    .topic-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .topic {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.06);
    }

    .upload-box {
      margin-top: 18px;
      padding: 24px;
      text-align: center;
      border: 1px dashed rgba(103, 232, 249, 0.55);
      border-radius: 20px;
      background: rgba(34, 211, 238, 0.05);
    }

    .upload-box input {
      display: none;
    }

    .upload-status {
      min-height: 22px;
      margin-top: 12px;
      color: #a7f3d0;
      font-size: 14px;
    }    #assistant {
      padding: 24px 0 80px;
    }

    .assistant-layout {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 22px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 24px;
    }

    .intro h2 {
      margin: 18px 0 12px;
      font-size: 42px;
      line-height: 1.05;
    }

    .intro p {
      color: var(--muted);
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 22px;
    }

    .chip {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .chat {
      min-height: 560px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #07101d;
    }

    .account-box {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 17px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
    }

    .account-box span {
      color: var(--muted);
      font-size: 13px;
    }

    .counter {
      padding: 10px 17px;
      border-bottom: 1px solid var(--line);
      color: #dbeafe;
      font-size: 13px;
    }

    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 18px;
    }

    .bubble {
      max-width: 86%;
      padding: 13px 15px;
      border-radius: 17px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .assistant-message {
      align-self: flex-start;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
    }

    .user-message {
      align-self: flex-end;
      background: linear-gradient(
        135deg,
        var(--purple),
        var(--purple-dark)
      );
    }

    .error-message {
      color: #fecdd3;
      border-color: rgba(251, 113, 133, 0.4);
    }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
    }

    .chat-form input {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 15px;
      outline: none;
      color: white;
      background: rgba(255, 255, 255, 0.06);
    }

    .chat-form button {
      padding: 0 20px;
      border: 0;
      border-radius: 15px;
      color: #07111f;
      font-weight: 900;
      background: linear-gradient(
        135deg,
        #67e8f9,
        #34d399
      );
    }

    .chat-form button:disabled,
    .chat-form input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .cta {
      margin: 0 auto 80px;
      padding: 38px;
      border: 1px solid var(--line);
      border-radius: 28px;
      text-align: center;
      background: linear-gradient(
        135deg,
        rgba(139, 92, 246, 0.25),
        rgba(34, 211, 238, 0.12)
      );
    }

    .cta h2 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 52px);
    }

    .cta p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    footer {
      padding: 30px 15px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    footer a {
      color: #cbd5e1;
      text-decoration: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(8px);
    }

    .modal.open {
      display: grid;
    }

    .modal-card {
      width: min(460px, 100%);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #0b1525;
    }

    .modal-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-heading h2 {
      margin: 0;
    }

    .close {
      border: 0;
      color: white;
      font-size: 32px;
      background: transparent;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 20px 0;
    }

    .tab {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: white;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.05);
    }

    .tab.active {
      background: linear-gradient(
        135deg,
        var        <article class="feature-card">

          </p>
          <button class="featureSoon">

          </button>
        </article>

        <article class="feature-card">
          <div class="feature-icon">🤝</div>
          <h3>Community Help</h3>
          <p>

          </p>
          <button class="featureSoon">

        </article>

        <article class="feature-card">

          <h3>Skill Swap</h3>

  </section>

  <section class="section" id="life-skills">
    <div class="wrap skills-strip">

      <div class="skills-panel">

<script>
const SUPABASE_URL = "https://cutqvgjtjpnypnmtgttd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dHF2Z2p0anBueXBubXRndHRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODcyNjUsImV4cCI6MjEwMDE2MzI2NX0.EuFtIR5o4Yh4QZd3kMSxpNAMTLMwzJIyRu0gmNl1znk";
const FREE_LIMIT = 10;

const $ = id => document.getElementById(id);

const els = {
  login: $("loginButton"),
  join: $("joinButton"),
  heroJoin: $("heroJoinButton"),
  bottomJoin: $("bottomJoinButton"),
  subscribe: $("subscribeButton"),
  logout: $("logoutButton"),
  modal: $("authModal"),
  close: $("closeModal"),
  joinTab: $("joinTab"),
  loginTab: $("loginTab"),
  title: $("authTitle"),
  nameField: $("nameField"),
  form: $("authForm"),
  name: $("fullName"),
  email: $("email"),
  password: $("password"),
  submit: $("authSubmit"),
  notice: $("authNotice"),
  account: $("accountBox"),
  counter: $("counter"),
  messages: $("messages"),
  chatForm: $("chatForm"),
  input: $("chatInput"),
  send: $("sendButton"),
  documentInput: $("documentInput"),
  uploadStatus: $("uploadStatus")
};

let mode = "join";
let currentUser = null;
let profile = null;

const configured =
  !SUPABASE_URL.startsWith("PASTE_") &&
  !SUPABASE_ANON_KEY.startsWith("PASTE_");

const sb = configured
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

function notice(msg, error = false) {
  els.notice.textContent = msg;
  els.notice.classList.toggle("error", error);
}

function bubble(text, who = "assistant", error = false) {
  const d = document.createElement("div");

  d.className =
    `bubble ${who === "user" ? "user-message" : "assistant-message"}` +
    `${error ? " error-message" : ""}`;

  d.textContent = text;

  els.messages.appendChild(d);
  els.messages.scrollTop = els.messages.scrollHeight;

  return d;
}

function setMode(next) {
  mode = next;

  const join = next === "join";

  els.joinTab.classList.toggle("active", join);
  els.loginTab.classList.toggle("active", !join);
  els.nameField.classList.toggle("hidden", !join);

  els.title.textContent = join ? "Join free" : "Log in";
  els.submit.textContent = join
    ? "Create free account"
    : "Log in";

  notice("");
}

function openModal(next) {
  setMode(next);
  els.modal.classList.add("open");

  setTimeout(() => els.email.focus(), 100);
}

function closeModal() {
  els.modal.classList.remove("open");
}

els.join.onclick = () => openModal("join");
els.heroJoin.onclick = () => openModal("join");
els.bottomJoin.onclick = () => openModal("join");
els.login.onclick = () => openModal("login");
els.close.onclick = closeModal;
els.joinTab.onclick = () => setMode("join");
els.loginTab.onclick = () => setMode("login");

els.modal.onclick = event => {
  if (event.target === els.modal) {
    closeModal();
  }
};

  button.onclick = () => {
    document
      .querySelector(button.dataset.scroll)
      ?.scrollIntoView({ behavior: "smooth" });
  };
});

  chip.onclick = () => {
    document
      .querySelector("#assistant")
      .scrollIntoView({ behavior: "smooth" });

    els.input.value = chip.textContent;
    els.input.focus();
  };
});

els.documentInput.addEventListener("change", () => {
  const file = els.documentInput.files?.[0];

  if (!file) {
    els.uploadStatus.textContent =
      "PDF, Word, image or text file";
    return;
  }

  const sizeMB = (file.size / 1024 / 1024).toFixed(1);

  els.uploadStatus.textContent =
    `Selected: ${file.name} (${sizeMB} MB) — ` +
    `secure AI analysis will be connected next.`;
});function normalizeProfile(row) {
  return {
    subscribed: Boolean(
      row?.subscribed ??
      row?.is_subscribed ??
      row?.subscription_active
    ),

    used: Number(
      row?.messages_used ??
      row?.message_count ??
      row?.free_messages_used ??
      0
    )
  };
}

async function loadProfile() {
  if (!currentUser || !sb) {
    profile = null;
    return;
  }

  const { data, error } = await sb.rpc("get_my_account");

  if (!error && data && data.length) {
    profile = normalizeProfile(data[0]);
    return;
  }

  profile = {
    subscribed: false,
    used: 0
  };
}

function render() {
  const logged = Boolean(currentUser);

  els.login.classList.toggle("hidden", logged);
  els.join.classList.toggle("hidden", logged);
  els.heroJoin.classList.toggle("hidden", logged);
  els.bottomJoin.classList.toggle("hidden", logged);
  els.logout.classList.toggle("hidden", !logged);

  const subscribed = Boolean(profile?.subscribed);

  els.subscribe.classList.toggle("hidden", subscribed);

  if (!logged) {
    els.account.innerHTML =
      "<strong>Not logged in</strong>" +
      "<span>Join free or log in to start.</span>";

    els.counter.textContent =
      "10 free messages after joining";

    els.input.disabled = true;
    els.send.disabled = true;
    els.input.placeholder = "Log in to start…";

    return;
  }

  const remaining = Math.max(
    0,
    FREE_LIMIT - (profile?.used || 0)
  );

  els.account.innerHTML =
    `<strong>${currentUser.email}</strong>` +
    `<span>${
      subscribed
        ? "Subscribed — unlimited messages"
        : "Free account"
    }</span>`;

  els.counter.textContent = subscribed
    ? "Unlimited messages included"
    : `${remaining} of ${FREE_LIMIT} free messages remaining`;

  const allowed = subscribed || remaining > 0;

  els.input.disabled = !allowed;
  els.send.disabled = !allowed;

  els.input.placeholder = allowed
    ? "Ask LifeCompass AI…"
    : "Free messages used — subscribe to continue";
}

els.logout.onclick = async () => {
  if (sb) {
    await sb.auth.signOut();
  }

  currentUser = null;
  profile = null;

  render();
};

$("forgotPassword").onclick = async () => {
  const email = els.email.value.trim();

  if (!email) {
    notice("Enter your email address first.", true);
    return;
  }

  try {
    const { error } = await sb.auth.resetPasswordForEmail(
      email,
      {
        redirectTo: "https://mylifecompassai.com"
      }
    );

    if (error) {
      throw error;
    }

    notice(
      "Password reset email sent. Check your inbox."
    );
  } catch (err) {
    notice(
      err.message ||
      "Unable to send reset email.",
      true
    );
  }
};

els.form.onsubmit = async event => {
  event.preventDefault();

  if (!configured) {
    notice(
      "Supabase details still need adding near the bottom of this file.",
      true
    );

    return;
  }

  els.submit.disabled = true;

  notice(
    mode === "join"
      ? "Creating your account…"
      : "Logging in…"
  );

  try {
    if (mode === "join") {
      const { error } = await sb.auth.signUp({
        email: els.email.value.trim(),
        password: els.password.value,

        options: {
          data: {
            full_name: els.name.value.trim()
          }
        }
      });

      if (error) {
        throw error;
      }

      notice(
        "Account created. Check your email, confirm it, then log in."
      );

      setMode("login");
    } else {
      const { data, error } =
        await sb.auth.signInWithPassword({
          email: els.email.value.trim(),
          password: els.password.value
        });

      if (error) {
        throw error;
      }

      currentUser = data.user;

      await loadProfile();

      render();
      closeModal();
    }
  } catch (err) {
    notice(
      err.message ||
      "Something went wrong.",
      true
    );
  } finally {
    els.submit.disabled = false;
  }
};

els.chatForm.onsubmit = async event => {
  event.preventDefault();

  const message = els.input.value.trim();

  if (!message || !currentUser) {
    return;
  }

  if (
    !profile?.subscribed &&
    (profile?.used || 0) >= FREE_LIMIT
  ) {
    render();
    return;
  }

  bubble(message, "user");

  els.input.value = "";
  els.input.disabled = true;
  els.send.disabled = true;

  const waiting = bubble("Thinking…");

  try {
    const {
      data: { session }
    } = await sb.auth.getSession();

    const response = await fetch("/api/chat", {
      method: "POST",

      headers: {
        "Content-Type": "application/json",

        "Authorization":
          `Bearer ${session?.access_token || ""}`
      },

      body: JSON.stringify({
        message
      })
    });

    const raw = await response.text();

    let data = {};

    try {
      data = raw
        ? JSON.parse(raw)
        : {};
    } catch {}

    if (!response.ok) {
      throw new Error(
        data.error ||
        data.message ||
        `Chat failed (${response.status})`
      );
    }

    waiting.textContent =
      data.reply ||
      data.response ||
      data.answer ||
      "I received your message but no answer was returned.";

    if (
      typeof data.messages_used === "number"
    ) {
      profile.used = data.messages_used;
    } else if (!profile.subscribed) {
      profile.used =
        (profile.used || 0) + 1;
    }

    if (
      typeof data.subscribed === "boolean"
    ) {
      profile.subscribed =
        data.subscribed;
    }

    await loadProfile();

    render();
  } catch (err) {
    waiting.textContent =
      err.message ||
      "Unable to send your message. Please try again.";

    waiting.classList.add("error-message");

    render();
  }
};

(async () => {
  if (!configured) {
    bubble(
      "Setup required: add your existing Supabase URL and anon key near the bottom of index.html.",
      "assistant",
      true
    );

    return;
  }

  const {
    data: { session }
  } = await sb.auth.getSession();

  currentUser =
    session?.user || null;

  if (currentUser) {
    await loadProfile();
  }

  render();

  sb.auth.onAuthStateChange(
    async (_, session) => {
      currentUser =
        session?.user || null;

      if (currentUser) {
        await loadProfile();
      } else {
        profile = null;
      }

      render();
    }
  );
})();
